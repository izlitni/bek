<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK — Admin Control Panel</title>
    <script>
        (function() {
            const allowed = 'bekbank.vercel.app';
            if (window.location.hostname !== allowed && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                window.location.replace('https://' + allowed);
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0A192F; --border: #E2E8F0; }
        body { font-family: 'Figtree', sans-serif; background: #F4F7F6; color: var(--navy); }
        .nav { background: #0A192F; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .data-table { width: 100%; text-align: left; border-collapse: collapse; font-size: 14px; }
        .data-table th { padding: 12px; border-bottom: 2px solid var(--border); background: #F8F9FA; color: #64748B; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .data-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .btn-red { background: #EF4444; color: white; padding: 6px 12px; border-radius: 4px; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 50; }
        .modal-overlay.active { display: flex; }
        .input-field { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="serif text-xl tracking-wider">BEK System Admin</div>
        <button onclick="logout()" class="btn-red">Terminate Session</button>
    </div>

    <div class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="card border-t-4 border-t-blue-500"><p class="text-xs text-gray-500 uppercase">Total Users</p><p class="text-2xl font-bold" id="totUsers">0</p></div>
            <div class="card border-t-4 border-t-green-500"><p class="text-xs text-gray-500 uppercase">Global Vault</p><p class="text-2xl font-bold text-green-600" id="totBal">$0</p></div>
            <div class="card border-t-4 border-t-yellow-500"><p class="text-xs text-gray-500 uppercase">Transactions</p><p class="text-2xl font-bold" id="totTxn">0</p></div>
            <div class="card border-t-4 border-t-red-500"><p class="text-xs text-gray-500 uppercase">Active Today</p><p class="text-2xl font-bold" id="actToday">0</p></div>
        </div>

        <div class="card mb-6">
            <h2 class="text-lg font-bold mb-4">Client Management</h2>
            <div class="overflow-x-auto">
                <table class="data-table">
                    <thead><tr><th>ID</th><th>Client Name</th><th>Username</th><th class="text-right">Balance</th><th>Actions</th></tr></thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { neon } from 'https://esm.sh/@neondatabase/serverless';
        const sql = neon('postgresql://neondb_owner:npg_fOPmFjJ4K6WN@ep-falling-haze-anzv2jzc-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require');

        if (!sessionStorage.getItem('bek_admin')) window.location.href = 'admin.html';

        async function loadData() {
            const users = await sql`SELECT * FROM users ORDER BY id ASC`;
            const txns = await sql`SELECT * FROM transactions`;
            
            document.getElementById('totUsers').textContent = users.length;
            document.getElementById('totTxn').textContent = txns.length;
            
            const bal = users.reduce((acc, curr) => acc + parseFloat(curr.balance), 0);
            document.getElementById('totBal').textContent = `$${bal.toLocaleString('en-US', {minimumFractionDigits:2})}`;
            
            const today = new Date().toISOString().split('T')[0];
            const active = new Set(txns.filter(t => t.created_at.startsWith(today)).map(t => t.user_id)).size;
            document.getElementById('actToday').textContent = active;

            document.getElementById('userTable').innerHTML = users.map(u => `
                <tr>
                    <td class="font-mono text-xs text-gray-500">#${String(u.id).padStart(5,'0')}</td>
                    <td class="font-bold">${u.name}</td>
                    <td>@${u.username}</td>
                    <td class="text-right font-bold text-green-600">$${parseFloat(u.balance).toLocaleString('en-US',{minimumFractionDigits:2})}</td>
                    <td>
                        <button onclick="deleteUser(${u.id})" class="text-red-500 hover:text-red-700 text-xs font-bold uppercase tracking-wider">Revoke</button>
                    </td>
                </tr>
            `).join('');
        }

        window.deleteUser = async (id) => {
            if(confirm('Are you sure you want to permanently delete this client?')) {
                await sql`DELETE FROM transactions WHERE user_id=${id}`; 
                await sql`DELETE FROM users WHERE id=${id}`;
                loadData();
            }
        };

        window.logout = () => { sessionStorage.removeItem('bek_admin'); window.location.href = 'admin.html'; };
        loadData();
    </script>
</body>
</html>
