<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK — Command Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #94a3b8; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .table-row:hover { background: rgba(255,255,255,0.02); }
        .badge { @apply px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider; }
        .modal { display: none; }
        .modal.active { display: flex; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">
    
    <nav class="glass border-b border-white/10 px-8 py-5 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-8">
            <span class="serif text-2xl text-white tracking-tighter">BEK <span class="text-yellow-500">/</span> SYSTEMS</span>
            <div class="hidden lg:flex gap-6 text-[10px] uppercase tracking-[0.2em] font-bold">
                <a href="#" class="text-white">Clients</a>
                <a href="#" class="text-slate-500 hover:text-white transition">Ledger</a>
                <a href="#" class="text-slate-500 hover:text-white transition">Security</a>
            </div>
        </div>
        <button onclick="logout()" class="text-xs font-bold text-red-500 hover:text-red-400 uppercase tracking-widest transition">Terminate Session</button>
    </nav>

    <main class="max-w-[1600px] mx-auto p-8 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-8 rounded-3xl">
                <p class="text-[10px] uppercase tracking-widest font-bold mb-2">Aggregate Capital</p>
                <p class="text-4xl text-white serif" id="stat-bal">$0.00</p>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-[10px] uppercase tracking-widest font-bold mb-2">Verified Entities</p>
                <p class="text-4xl text-white serif" id="stat-users">0</p>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-[10px] uppercase tracking-widest font-bold mb-2">System Health</p>
                <p class="text-4xl text-green-500 serif">99.9%</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3 glass rounded-3xl overflow-hidden">
                <div class="p-6 border-b border-white/5 flex justify-between items-center">
                    <h2 class="text-white font-bold">Client Directory</h2>
                    <input type="text" id="search" placeholder="Filter identities..." class="bg-black/20 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none focus:border-yellow-500 w-64">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[10px] uppercase tracking-widest bg-white/5 font-bold">
                            <tr>
                                <th class="p-5">Identifier</th>
                                <th class="p-5">Client Name</th>
                                <th class="p-5 text-right">Balance</th>
                                <th class="p-5 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userList" class="divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="glass rounded-3xl p-6 h-fit">
                <h2 class="text-white font-bold mb-6">Recent Ledger</h2>
                <div id="auditLog" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>
    </main>

    <div id="confirmModal" class="modal fixed inset-0 z-[100] items-center justify-center p-6 bg-black/90 backdrop-blur-sm">
        <div class="glass p-10 rounded-3xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            </div>
            <h3 class="text-white text-xl serif mb-2">Security Breach?</h3>
            <p class="text-sm text-slate-400 mb-8" id="confirmText">Are you certain you wish to delete this record?</p>
            <div class="flex gap-3
