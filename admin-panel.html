<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK — Command Panel</title>
    <script>
        (function() {
            const allowed = 'bekbank.vercel.app';
            if (window.location.hostname !== allowed && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                window.location.replace('https://' + allowed);
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Figtree', sans-serif; background: #050B14; color: #E2E8F0; min-height: 100vh; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass-panel { background: rgba(10, 25, 47, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .data-table th { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #64748B; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .data-table td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .data-table tr:hover { background: rgba(255,255,255,0.02); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid #EF4444; color: #EF4444; transition: 0.3s; }
        .btn-danger:hover { background: #EF4444; color: white; }
        
        /* Loading Spinner */
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #D4AF37; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="glass-panel sticky top-0 z-50 border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="h-8 w-8 bg-gradient-to-br from-[#D4AF37] to-yellow-200 rounded flex items-center justify-center text-[#0A192F] font-bold serif">B</div>
            <div>
                <h1 class="serif text-xl text-white leading-tight">BEK Command</h1>
                <p class="text-[10px] text-red-500 uppercase tracking-widest font-bold">Level 4 Clearance</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="statusIndicator" class="flex items-center gap-2 text-sm text-gray-400">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span></span>
                Connecting...
            </div>
            <button onclick="logout()" class="text-xs font-bold uppercase tracking-wider text-gray-400 hover:text-white transition px-4 py-2 border border-gray-700 rounded hover:bg-gray-800">Terminate</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div id="errorBanner" class="hidden bg-red-500/10 border border-red-500 text-red-500 px-4 py-3 rounded mb-6 flex justify-between items-center">
            <span id="errorMessage">Database connection failed.</span>
            <button onclick="loadData()" class="px-3 py-1 bg-red-500 text-white rounded text-xs font-bold">Retry</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-panel p-5 rounded-lg border-l-2 border-l-blue-500">
                <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Total Active Clients</p>
                <p class="text-3xl font-bold text-white" id="totUsers">--</p>
            </div>
            <div class="glass-panel p-5 rounded-lg border-l-2 border-l-green-500">
                <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Global Vault Assets</p>
                <p class="text-3xl font-bold text-[#D4AF37]" id="totBal">$--</p>
            </div>
            <div class="glass-panel p-5 rounded-lg border-l-2 border-l-purple-500">
                <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Total Transactions</p>
                <p class="text-3xl font-bold text-white" id="totTxn">--</p>
            </div>
            <div class="glass-panel p-5 rounded-lg border-l-2 border-l-red-500">
                <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">System Load</p>
                <p class="text-3xl font-bold text-white" id="sysLoad">Stable</p>
            </div>
        </div>

        <div class="glass-panel rounded-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-white/10 flex justify-between items-center bg-white/5">
                <h2 class="text-lg font-bold text-white">Client Database</h2>
                <button onclick="loadData()" class="text-xs text-[#D4AF37] hover:text-white transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Refresh Data
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="data-table w-full text-left border-collapse">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Client Profile</th>
                            <th>Security Hash</th>
                            <th class="text-right">Liquid Assets</th>
                            <th class="text-center">Protocol</th>
                        </tr>
                    </thead>
                    <tbody id="userTable">
                        <tr><td colspan="5" class="text-center py-10"><div class="loader"></div><p class="text-gray-500 text-xs mt-3 uppercase tracking-wider">Fetching secure records...</p></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { neon } from 'https://esm.sh/@neondatabase/serverless';
        const sql = neon('postgresql://neondb_owner:npg_fOPmFjJ4K6WN@ep-falling-haze-anzv2jzc-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require');

        // Security Check
        if (!sessionStorage.getItem('bek_admin')) window.location.replace('admin.html');

        const statusIndicator = document.getElementById('statusIndicator');
        const errorBanner = document.getElementById('errorBanner');
        const errorMessage = document.getElementById('errorMessage');

        window.loadData = async () => {
            // Reset UI State
            errorBanner.classList.add('hidden');
            statusIndicator.innerHTML = '<span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span></span> Syncing...';
            document.getElementById('userTable').innerHTML = '<tr><td colspan="5" class="text-center py-10"><div class="loader"></div></td></tr>';

            try {
                // Fetch Data concurrently
                const users = await sql`SELECT * FROM users ORDER BY id DESC`;
                
                let txns = [];
                try { 
                    txns = await sql`SELECT * FROM transactions`; 
                } catch(e) { 
                    console.warn("Transactions table empty or missing, skipping txn count."); 
                }

                // Calculate Stats
                document.getElementById('totUsers').textContent = users.length;
                document.getElementById('totTxn').textContent = txns.length;
                
                const totalBalance = users.reduce((sum, user) => sum + (parseFloat(user.balance) || 0), 0);
                document.getElementById('totBal').textContent = `$${totalBalance.toLocaleString('en-US', {minimumFractionDigits: 2})}`;

                // Render Table
                if (users.length === 0) {
                    document.getElementById('userTable').innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500 italic">No clients found in database.</td></tr>';
                } else {
                    document.getElementById('userTable').innerHTML = users.map(u => `
                        <tr>
                            <td class="font-mono text-xs text-gray-500">#${String(u.id).padStart(5,'0')}</td>
                            <td>
                                <div class="font-bold text-white">${u.name}</div>
                                <div class="text-xs text-gray-500">@${u.username}</div>
                            </td>
                            <td class="font-mono text-[10px] text-gray-600">${u.password_hash}</td>
                            <td class="text-right font-mono font-bold text-[#D4AF37]">$${(parseFloat(u.balance) || 0).toLocaleString('en-US', {minimumFractionDigits:2})}</td>
                            <td class="text-center">
                                <button onclick="deleteUser(${u.id}, '${u.username}')" class="btn-danger px-3 py-1 rounded text-[10px] font-bold uppercase tracking-wider">Revoke</button>
                            </td>
                        </tr>
                    `).join('');
                }

                // Update Status to Online
                statusIndicator.innerHTML = '<span class="relative flex h-2 w-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span> System Online';
            
            } catch (err) {
                console.error("Data Fetch Error:", err);
                errorBanner.classList.remove('hidden');
                errorMessage.textContent = "Data retrieval failed. Please check database connection.";
                statusIndicator.innerHTML = '<span class="relative flex h-2 w-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span></span> Offline';
                document.getElementById('userTable').innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-500">Failed to load client data.</td></tr>';
            }
        };

        window.deleteUser = async (id, username) => {
            if(confirm(`WARNING: Are you sure you want to completely erase client @${username} and all their transaction history? This action is irreversible.`)) {
                try {
                    // Delete transactions first to prevent foreign key constraint errors
                    try { await sql`DELETE FROM transactions WHERE user_id=${id}`; } catch(e) {} 
                    await sql`DELETE FROM users WHERE id=${id}`;
                    loadData(); // Refresh UI
                } catch(err) {
                    alert("Failed to delete user. Check console for details.");
                    console.error(err);
                }
            }
        };

        window.logout = () => { 
            sessionStorage.removeItem('bek_admin'); 
            window.location.replace('admin.html'); 
        };

        // Initialize
        loadData();
    </script>
</body>
</html>
