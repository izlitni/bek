<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK — Admin Access</title>
    <script>
        (function() {
            const allowed = 'bekbank.vercel.app';
            if (window.location.hostname !== allowed && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                window.location.replace('https://' + allowed);
            }
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0A192F; font-family: 'Figtree', sans-serif; }
        .card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; border-top: 5px solid #EF4444; }
        h1 { font-family: 'Playfair Display', serif; color: #0A192F; font-size: 28px; margin: 0 0 5px 0; }
        p { color: #64748B; font-size: 14px; margin-bottom: 30px; }
        .input { width: 100%; padding: 12px; border: 1px solid #E2E8F0; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        .input:focus { outline: none; border-color: #EF4444; }
        .btn { width: 100%; background: #EF4444; color: white; border: none; padding: 14px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #DC2626; }
        .back { display: block; margin-top: 20px; font-size: 13px; color: #64748B; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Admin Gateway</h1>
        <p>Restricted Corporate Access Only</p>
        <form id="adminForm">
            <input type="text" id="adminUser" class="input" placeholder="Admin ID" required>
            <input type="password" id="adminPass" class="input" placeholder="Passcode" required>
            <button type="submit" class="btn">Authenticate</button>
        </form>
        <a href="index.html" class="back">&larr; Return to Public Site</a>
    </div>

    <script type="module">
        import { neon } from 'https://esm.sh/@neondatabase/serverless';
        const sql = neon('postgresql://neondb_owner:npg_fOPmFjJ4K6WN@ep-falling-haze-anzv2jzc-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require');
        
        function hashPassword(input) {
            let h = 0; input = input.toUpperCase().replace(/[^A-Z]/g, '');
            for (let i = 0; i < input.length; i++) h = (h * 31 + (input.charCodeAt(i) - 64)) % 9999991;
            return h.toString().padStart(7, '0');
        }

        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const r = await sql`SELECT * FROM admin WHERE username = ${document.getElementById('adminUser').value.trim()} AND password_hash = ${hashPassword(document.getElementById('adminPass').value)}`;
            if (r.length > 0) {
                sessionStorage.setItem('bek_admin', 'true');
                window.location.href = 'admin-panel.html';
            } else { alert('Access Denied: Invalid Credentials'); }
        });
    </script>
</body>
</html>
