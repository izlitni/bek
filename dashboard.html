<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #fcfcfd;
            --sidebar-bg: #ffffff;
            --accent: #2563eb;
            --accent-soft: #eff6ff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #f1f5f9;
        }
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); }

        /* Sidebar Styling */
        .sidebar { width: 260px; height: 100vh; position: fixed; background: var(--sidebar-bg); border-right: 1px solid var(--border); }
        .main-content { margin-left: 260px; min-height: 100vh; padding: 2rem; }

        /* Card Designs */
        .glass-card { background: #ffffff; border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.01); }
        .balance-card { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        .balance-card::after {
            content: ''; position: absolute; top: -50%; right: -20%; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(37,99,235,0.2) 0%, transparent 70%);
        }

        /* Elements */
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-sub); transition: all 0.2s; cursor: pointer; }
        .nav-item:hover { background: var(--accent-soft); color: var(--accent); }
        .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

        .btn-action { background: var(--accent); color: white; border-radius: 12px; transition: 0.2s; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }

        .data-table th { color: var(--text-sub); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 16px; border-bottom: 1px solid var(--border); }
        .data-table td { padding: 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }

        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; }
        .badge-received { background: #dcfce7; color: #15803d; }
        .badge-sent { background: #fee2e2; color: #b91c1c; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        
        @media(max-width: 1024px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 1rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">B</div>
            <span class="text-xl font-extrabold tracking-tight">BEK Bank</span>
        </div>

        <nav class="space-y-2 flex-grow">
            <div class="nav-item active"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg> Dashboard</div>
            <div class="nav-item"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg> Transactions</div>
            <div class="nav-item"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg> Security</div>
        </nav>

        <div class="pt-6 border-t border-slate-100">
            <button onclick="logout()" class="nav-item w-full text-red-500 hover:bg-red-50 hover:text-red-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg> Logout
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 id="welcomeUser" class="text-2xl font-bold text-slate-900">Welcome back</h1>
                <p class="text-slate-500 text-sm">Here's what's happening with your account today.</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="openModal('transferModal')" class="btn-action px-5 py-2.5 font-semibold text-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Send Money
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="lg:col-span-2 glass-card balance-card p-8 flex flex-col justify-between min-h-[220px]">
                <div>
                    <p class="text-slate-400 text-sm font-medium mb-1">Total Balance</p>
                    <h2 id="userBalance" class="text-5xl font-bold tracking-tight">$0.00</h2>
                </div>
                <div class="flex justify-between items-end">
                    <p id="userAccountNum" class="font-mono text-sm opacity-60"></p>
                    <div class="flex -space-x-2">
                        <div class="w-8 h-8 rounded-full border-2 border-slate-800 bg-slate-700"></div>
                        <div class="w-8 h-8 rounded-full border-2 border-slate-800 bg-slate-600"></div>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="glass-card p-6 flex items-center justify-between">
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase mb-1">Inflow</p>
                        <p id="totalDeposits" class="text-xl font-bold text-emerald-600">$0.00</p>
                    </div>
                    <div class="p-3 bg-emerald-50 rounded-xl text-emerald-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                    </div>
                </div>
                <div class="glass-card p-6 flex items-center justify-between">
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase mb-1">Outflow</p>
                        <p id="totalWithdrawals" class="text-xl font-bold text-rose-600">$0.00</p>
                    </div>
                    <div class="p-3 bg-rose-50 rounded-xl text-rose-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-bold text-lg">Recent Transactions</h3>
                <span id="transactionCount" class="text-xs font-bold bg-slate-100 px-2 py-1 rounded text-slate-600">0 Total</span>
            </div>
            <div class="overflow-x-auto">
                <table class="data-table w-full text-left">
                    <thead>
                        <tr>
                            <th>Transaction</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th class="text-right">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="transactionBody">
                        <tr><td colspan="4" class="text-center py-12 text-slate-400">Loading your history...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="transferModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">Transfer</h3>
                <button onclick="closeModalById('transferModal')" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="transferForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Recipient</label>
                    <select id="transferTo" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all" required>
                        <option value="">Select recipient...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Amount</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 font-bold text-slate-400">$</span>
                        <input type="number" id="transferAmount" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-8 pr-4 py-3 outline-none focus:border-blue-500 transition-all" placeholder="0.00" step="0.01" min="0.01" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Reference (Optional)</label>
                    <input type="text" id="transferNote" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all" placeholder="What's this for?">
                </div>
                <button type="submit" class="btn-action w-full py-4 font-bold text-lg mt-4">Confirm Transfer</button>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-6 right-6 z-[3000] space-y-3"></div>

    <script type="module">
        import { neon } from 'https://esm.sh/@neondatabase/serverless';
        const sql = neon('postgresql://neondb_owner:npg_fOPmFjJ4K6WN@ep-falling-haze-anzv2jzc-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require');

        let currentUser = null;

        // Auth Logic
        const saved = sessionStorage.getItem('bek_user');
        if (!saved) { window.location.href = 'index'; }
        currentUser = JSON.parse(saved);

        async function refreshUser() {
            const r = await sql`SELECT * FROM users WHERE id = ${currentUser.id}`;
            if (r.length > 0) {
                currentUser = { ...r[0], balance: parseFloat(r[0].balance) };
                sessionStorage.setItem('bek_user', JSON.stringify(currentUser));
            }
        }

        async function loadDashboard() {
            await refreshUser();
            
            // UI Update
            document.getElementById('welcomeUser').textContent = `Hello, ${currentUser.name.split(' ')[0]} 👋`;
            document.getElementById('userBalance').textContent = `$${currentUser.balance.toLocaleString('en-US', {minimumFractionDigits:2})}`;
            document.getElementById('userAccountNum').textContent = `BEK • ${String(currentUser.id).padStart(8,'0')}`;

            // Txns
            const txns = await sql`SELECT * FROM transactions WHERE user_id = ${currentUser.id} ORDER BY created_at DESC`;
            let dep = 0, wd = 0;
            txns.forEach(t => { 
                const amt = parseFloat(t.amount);
                if (t.type === 'deposit' || t.type === 'received') dep += amt; 
                else wd += amt; 
            });

            document.getElementById('totalDeposits').textContent = `+$${dep.toLocaleString()}`;
            document.getElementById('totalWithdrawals').textContent = `-$${wd.toLocaleString()}`;
            document.getElementById('transactionCount').textContent = `${txns.length} Total`;

            renderTxns(txns);

            // Dropdown
            const users = await sql`SELECT * FROM users WHERE id != ${currentUser.id} AND status = 'active'`;
            document.getElementById('transferTo').innerHTML = '<option value="">Select recipient...</option>' + 
                users.map(u => `<option value="${u.username}">${u.name}</option>`).join('');
        }

        function renderTxns(txns) {
            const tbody = document.getElementById('transactionBody');
            if (!txns.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-20 text-slate-400 font-medium">No transactions found</td></tr>';
                return;
            }
            tbody.innerHTML = txns.map(t => {
                const isGain = t.type === 'deposit' || t.type === 'received';
                const date = new Date(t.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                return `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td>
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center ${isGain ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="${isGain ? 'M7 11l5-5m0 0l5 5m-5-5v12' : 'M17 13l-5 5m0 0l-5-5m5 5V6'}"/></svg>
                                </div>
                                <div>
                                    <p class="font-bold text-sm">${t.description}</p>
                                    <p class="text-xs text-slate-400 capitalize">${t.type}</p>
                                </div>
                            </div>
                        </td>
                        <td class="text-sm font-medium text-slate-500">${date}</td>
                        <td><span class="badge ${isGain ? 'badge-received' : 'badge-sent'}">Success</span></td>
                        <td class="text-right font-bold ${isGain ? 'text-emerald-600' : 'text-slate-900'}">
                            ${isGain ? '+' : '-'}$${parseFloat(t.amount).toFixed(2)}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Action Handlers
        async function transferMoney(fromId, toUsername, amount, note) {
            try {
                const toUserArr = await sql`SELECT * FROM users WHERE username = ${toUsername}`;
                // Step 2: Get sender and validate balance
                const fromUserArr = await sql`
                    SELECT * FROM users 
                    WHERE id = ${fromId}
                `;
                if (!toUserArr.length) return { success: false, message: 'Recipient not found' };
                const toUser = toUserArr[0];
                const numAmount = parseFloat(amount);
                const fromUser = fromUserArr[0];

                if (currentUser.balance < numAmount) return { success: false, message: 'Insufficient balance' };

                // Step 3: Insert sent transaction with EXPLICIT type casting
                await sql`
                    INSERT INTO transactions (user_id, type, description, amount)
                    VALUES (
                        ${fromId}, 
                        'sent', 
                        ${'Transfer to ' + toUser.username + ': ' + note},
                        ${numAmount}::numeric(15,2)
                    )
                `;
                
                // Step 4: Deduct from sender
                await sql`
                    UPDATE users 
                    SET balance = balance - ${numAmount}::numeric(15,2)
                    WHERE id = ${fromId}
                `;

                // Step 5: Insert received transaction
                await sql`
                    INSERT INTO transactions (user_id, type, description, amount)
                    VALUES (
                        ${toUser.id}, 
                        'received',
                        ${'Transfer from ' + fromUser.username + ': ' + note},
                        ${numAmount}::numeric(15,2)
                    )
                `;

                // Step 6: Add to receiver
                await sql`
                    UPDATE users 
                    SET balance = balance + ${numAmount}::numeric(15,2)
                    WHERE id = ${toUser.id}
                `;

                return { success: true };
            } catch(e) { return { success: false, message: e.message }; }
        }

        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const to = document.getElementById('transferTo').value;
            const amt = document.getElementById('transferAmount').value;
            const note = document.getElementById('transferNote').value || 'Payment';

            showToast('Syncing with blockchain...', 'info');
            const r = await transferMoney(currentUser.id, to, amt, note);
            
            if (r.success) {
                showToast('Funds delivered successfully', 'success');
                closeModalById('transferModal');
                e.target.reset();
                loadDashboard();
            } else {
                showToast(r.message, 'error');
            }
        });

        // Global UI helpers
        window.openModal = (id) => { document.getElementById(id).classList.add('active'); };
        window.closeModalById = (id) => { document.getElementById(id).classList.remove('active'); };
        window.closeModal = (e) => { if(e.target === e.currentTarget) e.target.classList.remove('active'); };
        window.logout = () => { sessionStorage.clear(); window.location.href = 'index'; };

        function showToast(msg, type) {
            const t = document.createElement('div');
            const colors = { success: 'border-emerald-500', error: 'border-rose-500', info: 'border-blue-500' };
            t.className = `bg-white border-l-4 ${colors[type]} p-4 rounded-xl shadow-xl animate-bounce-in min-w-[280px] font-bold text-sm`;
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(20px)'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        loadDashboard();
    </script>
</body>
</html>
